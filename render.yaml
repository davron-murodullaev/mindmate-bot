services:
  - type: worker            # IMPORTANT: long-polling Telegram bot, not a web server
    name: mindmate-bot
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false

      # ── AI provider — change to 'anthropic' to switch to Claude ──
      - key: AI_PROVIDER
        value: openai

      # OpenAI (used when AI_PROVIDER=openai)
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini

      # Anthropic (used when AI_PROVIDER=anthropic)
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-5

      - key: DATABASE_URL
        fromDatabase:
          name: mindmate-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: ENABLE_REMINDERS
        value: true
      - key: ENABLE_ANALYTICS
        value: true
      - key: MAX_TOKENS
        value: 2048
      - key: TEMPERATURE
        value: 0.7
      - key: TIMEZONE
        value: Asia/Tashkent

databases:
  - name: mindmate-db
    databaseName: mindmate
    user: mindmate
    region: oregon
    plan: free
