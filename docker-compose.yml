version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: mindmate-db
    environment:
      POSTGRES_DB: mindmate
      POSTGRES_USER: mindmate_user
      POSTGRES_PASSWORD: your_secure_password_here
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindmate_user -d mindmate"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MindMate Bot
  bot:
    build: .
    container_name: mindmate-bot
    environment:
      DATABASE_URL: postgresql://mindmate_user:your_secure_password_here@db:5432/mindmate
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
